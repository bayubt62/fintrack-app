<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fintrack - Ultimate Wealth UI</title>
    <link rel="icon" href="Logo_Fintrack.png" type="image/png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { primary: '#6342E8', secondary: '#A88FFF' } } }
        }
    </script>

    <style>
        body { font-family: 'Poppins', sans-serif; overflow-x: hidden; transition: background-color 0.3s, color 0.3s; }
        .hidden-page { display: none !important; }
        .bg-purple-gradient { background: linear-gradient(135deg, #A88FFF 0%, #6342E8 100%); }
        .bg-light-purple { background-color: #F0EDFF; }
        .text-primary { color: #6342E8; }
        ::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .form-input { background: transparent; border: none; text-align: center; width: 100%; outline: none; }
        #loader-overlay { z-index: 9999; }
        .nav-btn.active { color: #6342E8; }
        .filter-tab.active { background-color: #6342E8; color: white; border-color: #6342E8; }
        .filter-tab { background-color: white; color: #6B7280; border: 1px solid #E5E7EB; transition: all 0.2s; }
        .dark .filter-tab { background-color: #1F2937; border-color: #374151; color: #9CA3AF; }
        .dark .filter-tab.active { background-color: #6342E8; color: white; border-color: #6342E8; }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen relative bg-[#F8F9FA] dark:bg-gray-900 text-gray-800 dark:text-gray-100 pb-28">

    <div id="loader-overlay" class="fixed inset-0 hidden flex flex-col justify-center items-center bg-white/90 dark:bg-gray-900/90">
        <div class="w-10 h-10 border-4 border-[#6342E8] border-t-transparent rounded-full animate-spin"></div>
    </div>

    <div id="toast" class="fixed top-5 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-full shadow-2xl transition-all duration-300 opacity-0 z-[9999] pointer-events-none flex items-center gap-2 translate-y-[-20px]">
        <span id="toast-icon" class="font-bold"></span>
        <span id="toast-msg" class="text-sm font-bold">Pesan</span>
    </div>

    <div id="login-screen" class="min-h-screen flex flex-col justify-center px-8 bg-white dark:bg-gray-900 relative">
        <div class="z-10">
            <img src="Logo_Fintrack.png" alt="Fintrack Logo" class="h-20 w-auto mb-4 object-contain">
            <p data-i18n="signIn" class="text-sm text-gray-400 mb-10">Masuk ke dompet Anda</p>
            <form id="login-form" class="space-y-4">
                <input type="email" id="login-email" data-i18n-placeholder="emailPlaceholder" placeholder="Alamat Email" class="w-full p-4 bg-gray-50 dark:bg-gray-800 dark:text-white border border-gray-100 dark:border-gray-700 rounded-2xl outline-none focus:border-[#6342E8]" required>
                <input type="password" id="login-password" data-i18n-placeholder="passPlaceholder" placeholder="Kata Sandi" class="w-full p-4 bg-gray-50 dark:bg-gray-800 dark:text-white border border-gray-100 dark:border-gray-700 rounded-2xl outline-none focus:border-[#6342E8]" required>
                <button type="submit" data-i18n="btnLogin" class="w-full bg-[#6342E8] text-white py-4 rounded-2xl font-semibold shadow-lg shadow-purple-200 dark:shadow-none mt-4 active:scale-95 transition">Masuk</button>
            </form>
        </div>
        <div class="absolute top-[-10%] right-[-20%] w-64 h-64 bg-light-purple dark:bg-[#6342E8]/20 rounded-full blur-3xl opacity-60 pointer-events-none"></div>
    </div>

    <div id="dashboard-screen" class="hidden-page">
        <header class="px-6 pt-10 pb-4 flex justify-between items-center">
            <div>
                <p data-i18n="hello" class="text-gray-500 dark:text-gray-400 text-[13px] mb-1">Halo,</p>
                <h1 id="user-display-name" class="font-bold text-xl text-gray-900 dark:text-white leading-tight">User Name!</h1>
            </div>
            <div class="flex gap-2">
                <button type="button" onclick="toggleTheme()" class="w-12 h-10 rounded-[16px] border border-gray-200 dark:border-gray-700 flex items-center justify-center bg-white dark:bg-gray-800 shadow-sm active:scale-95 transition focus:outline-none">
                    <span class="dark:hidden text-lg">🌙</span>
                    <span class="hidden dark:block text-lg">☀️</span>
                </button>
                <button type="button" onclick="toggleLanguage()" class="w-12 h-10 rounded-[16px] border border-gray-200 dark:border-gray-700 flex items-center justify-center text-[#6342E8] dark:text-secondary font-black text-xs bg-white dark:bg-gray-800 shadow-sm active:scale-95 transition focus:outline-none">
                    <span id="lang-indicator">ID</span>
                </button>
            </div>
        </header>

        <section class="px-6 mb-6">
            <div class="bg-purple-gradient rounded-[28px] p-6 shadow-xl shadow-purple-200 dark:shadow-none relative overflow-hidden">
                <div class="relative z-10">
                    <p data-i18n="currentBalance" class="text-white text-xs opacity-80 mb-1">Saldo Saat Ini</p>
                    <div class="flex items-center gap-3">
                        <h2 id="total-balance" class="text-white text-3xl font-bold tracking-tight">********</h2>
                        <button type="button" onclick="toggleHomeBalance()" class="text-white opacity-80 hover:opacity-100 transition focus:outline-none">
                            <svg id="eye-icon-home" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"></path></svg>
                        </button>
                    </div>
                </div>
                <div class="absolute -bottom-10 -right-10 w-32 h-32 bg-white opacity-10 rounded-full pointer-events-none"></div>
            </div>
        </section>

        <section class="px-6 mb-6">
            <h3 data-i18n="monthlySummary" class="font-bold text-gray-900 dark:text-white text-sm mb-3">Ringkasan Bulanan</h3>
            <div class="flex gap-4">
                <div class="flex-1 bg-[#6342E8] p-5 rounded-[24px] shadow-md text-white">
                    <p data-i18n="income" class="text-[11px] opacity-80 mb-1">Pemasukan</p>
                    <p id="total-income" class="font-bold text-sm">********</p>
                </div>
                <div class="flex-1 bg-white dark:bg-gray-800 p-5 rounded-[24px] shadow-sm border border-gray-100 dark:border-gray-700">
                    <p data-i18n="expenditure" class="text-[11px] text-gray-400 dark:text-gray-400 mb-1">Pengeluaran</p>
                    <p id="total-expenditure" class="font-bold text-sm text-gray-900 dark:text-white">********</p>
                </div>
            </div>
        </section>

        <section class="px-6 mb-6">
            <h3 data-i18n="quickMenu" class="font-bold text-gray-900 dark:text-white text-sm mb-3">Menu Cepat</h3>
            <div class="flex gap-3 overflow-x-auto pb-2 hide-scrollbar">
                <button type="button" onclick="goToForm('Inflow')" class="flex-none w-24 bg-light-purple dark:bg-gray-800 p-4 rounded-[20px] flex flex-col items-center justify-center gap-2 active:scale-95 transition border dark:border-gray-700">
                    <div class="w-10 h-10 bg-white dark:bg-gray-700 rounded-full shadow-sm flex items-center justify-center text-[#6342E8] dark:text-secondary">💰</div>
                    <span data-i18n="topUp" class="text-[10px] font-semibold text-[#6342E8] dark:text-secondary">Isi Saldo</span>
                </button>
                <button type="button" onclick="goToForm('Outflow')" class="flex-none w-24 bg-light-purple dark:bg-gray-800 p-4 rounded-[20px] flex flex-col items-center justify-center gap-2 active:scale-95 transition border dark:border-gray-700">
                    <div class="w-10 h-10 bg-white dark:bg-gray-700 rounded-full shadow-sm flex items-center justify-center text-[#6342E8] dark:text-secondary">💳</div>
                    <span data-i18n="pay" class="text-[10px] font-semibold text-[#6342E8] dark:text-secondary">Bayar</span>
                </button>
                <button type="button" onclick="goToTransferForm()" class="flex-none w-24 bg-light-purple dark:bg-gray-800 p-4 rounded-[20px] flex flex-col items-center justify-center gap-2 active:scale-95 transition border dark:border-gray-700">
                    <div class="w-10 h-10 bg-white dark:bg-gray-700 rounded-full shadow-sm flex items-center justify-center text-[#6342E8] dark:text-secondary">⇄</div>
                    <span data-i18n="transfer" class="text-[10px] font-semibold text-[#6342E8] dark:text-secondary">Transfer</span>
                </button>
                <button type="button" onclick="openUniversalModal('recurring')" class="flex-none w-24 bg-light-purple dark:bg-gray-800 p-4 rounded-[20px] flex flex-col items-center justify-center gap-2 active:scale-95 transition border dark:border-gray-700">
                    <div class="w-10 h-10 bg-white dark:bg-gray-700 rounded-full shadow-sm flex items-center justify-center text-[#6342E8] dark:text-secondary">🔄</div>
                    <span data-i18n="recurringMenu" class="text-[10px] font-semibold text-[#6342E8] dark:text-secondary">Langganan</span>
                </button>
            </div>
        </section>

        <section class="px-6 mb-6">
            <div class="flex justify-between items-center mb-3">
                <h3 data-i18n="savingsGoals" class="font-bold text-gray-900 dark:text-white text-sm">Target Tabungan</h3>
                <button onclick="openUniversalModal('goal')" class="text-[#6342E8] dark:text-secondary text-[11px] font-bold bg-purple-50 dark:bg-gray-800 px-3 py-1 rounded-lg">+ Baru</button>
            </div>
            <div id="goals-container" class="space-y-3"></div>
        </section>

        <section class="px-6 mb-6">
            <div class="flex justify-between items-center mb-3">
                <h3 data-i18n="debts" class="font-bold text-gray-900 dark:text-white text-sm">Buku Utang & Piutang</h3>
                <button onclick="openUniversalModal('debt')" class="text-[#6342E8] dark:text-secondary text-[11px] font-bold bg-purple-50 dark:bg-gray-800 px-3 py-1 rounded-lg">+ Catat</button>
            </div>
            <div id="debts-container" class="space-y-3"></div>
        </section>

        <section class="px-6 mb-10">
            <h3 data-i18n="yourAccounts" class="font-bold text-gray-900 dark:text-white text-sm mb-4">Daftar Akun</h3>
            <div id="account-list" class="space-y-3 bg-white dark:bg-gray-800 p-5 rounded-[24px] shadow-sm border border-gray-100 dark:border-gray-700"></div>
        </section>
    </div>

    <div id="portfolio-screen" class="hidden-page min-h-screen bg-[#F8F9FA] dark:bg-gray-900 pb-24 px-6">
        <h2 data-i18n="myInvestments" class="font-bold text-xl text-[#6342E8] dark:text-secondary mt-10 mb-4">Investasi Saya</h2>
        <div class="bg-white dark:bg-gray-800 p-6 rounded-[24px] shadow-sm border border-gray-100 dark:border-gray-700 mb-6 flex justify-between items-center">
            <div>
                <p data-i18n="totalPortfolio" class="text-[10px] text-gray-400 font-bold uppercase mb-1">Total Portofolio</p>
                <h2 id="total-investasi" class="text-3xl font-bold dark:text-white">********</h2>
            </div>
            <button onclick="goToAssetForm()" class="bg-[#6342E8] text-white p-3 rounded-full">+</button>
        </div>
        <div id="portfolio-list" class="space-y-4"></div>
    </div>

    <div id="history-screen" class="hidden-page min-h-screen bg-[#F8F9FA] dark:bg-gray-900 pb-24 px-6">
        <header class="pt-10 flex justify-between items-center mb-6">
            <h2 data-i18n="history" class="font-bold text-gray-900 dark:text-white text-2xl">Riwayat</h2>
            <button onclick="exportToPDF()" class="text-[#6342E8] text-sm font-bold">Export PDF</button>
        </header>
        <div id="history-list-container" class="space-y-4"></div>
    </div>

    <div id="calendar-screen" class="hidden-page min-h-screen bg-[#F8F9FA] dark:bg-gray-900 pb-24 px-6">
        <h2 data-i18n="calendar" class="font-bold text-xl text-[#6342E8] mt-10 mb-4">Kalender</h2>
        <div id="calendar-grid" class="grid grid-cols-7 gap-1"></div>
    </div>

    <div id="form-screen" class="hidden-page min-h-screen bg-white dark:bg-gray-900 absolute inset-0 z-50 p-6">
        <button onclick="goToNav('dashboard')" class="mb-6 text-gray-400 font-bold">✕ TUTUP</button>
        <form id="trans-form" class="space-y-6">
            <div class="text-center">
                <p class="text-xs text-gray-400 font-bold uppercase">Nominal</p>
                <input type="text" id="jumlah" class="text-4xl font-bold text-center w-full outline-none text-[#6342E8] bg-transparent" placeholder="0" required autofocus>
            </div>
            <div class="space-y-4">
                <input type="text" id="keterangan" placeholder="Keterangan" class="w-full p-4 bg-gray-50 dark:bg-gray-800 rounded-2xl outline-none border dark:border-gray-700">
                <select id="kategori" class="w-full p-4 bg-gray-50 dark:bg-gray-800 rounded-2xl outline-none border dark:border-gray-700"></select>
                <select id="akun" class="w-full p-4 bg-gray-50 dark:bg-gray-800 rounded-2xl outline-none border dark:border-gray-700"></select>
            </div>
            <button type="submit" class="w-full bg-[#6342E8] text-white py-4 rounded-2xl font-bold shadow-lg">SIMPAN DATA</button>
        </form>
    </div>

    <div id="universal-modal-container" class="fixed inset-0 hidden z-[60] bg-black/60 p-6 flex flex-col justify-end pb-10">
        <div class="bg-white dark:bg-gray-800 w-full rounded-[32px] p-6 shadow-2xl relative">
            <button onclick="closeUniversalModal()" class="absolute top-4 right-4 text-gray-400">✕</button>
            <h2 id="universal-modal-title" class="font-bold text-lg mb-6 dark:text-white">Formulir</h2>
            <form id="universal-form" class="space-y-4"></form>
        </div>
    </div>

    <nav id="bottom-nav" class="hidden-page fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white dark:bg-gray-800 border-t border-gray-100 dark:border-gray-700 px-6 py-4 flex justify-between items-center rounded-t-[32px] shadow-2xl z-40">
        <button type="button" onclick="goToNav('dashboard')" id="nav-dashboard" class="nav-btn active text-gray-400">DASH</button>
        <button type="button" onclick="goToNav('portfolio')" id="nav-portfolio" class="nav-btn text-gray-400">PORTO</button>
        <button type="button" onclick="goToNav('history')" id="nav-history" class="w-14 h-14 bg-[#6342E8] text-white rounded-full flex items-center justify-center relative -top-8 shadow-xl">HIST</button>
        <button type="button" onclick="goToNav('calendar')" id="nav-calendar" class="nav-btn text-gray-400">CAL</button>
        <button type="button" onclick="logout()" class="text-red-400">EXIT</button>
    </nav>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycby_UJVN9rtPDxwzeMCC13e9c9dOtDaFBa3YekQEYIM81UO2EbD57ofD3yuOwSnXUAiy/exec";
        
        let currentUser = JSON.parse(localStorage.getItem("fintrack_user"));
        let allAccounts = [], allHistory = [], allPortfolio = [], allData = {}; 
        let isHomeBalanceHidden = true; let currentLang = "id";

        const translations = {
            id: { signIn: "Masuk ke dompet Anda", hello: "Halo,", currentBalance: "Saldo Saat Ini", quickMenu: "Menu Cepat", topUp: "Isi Saldo", pay: "Bayar", transfer: "Transfer", yourAccounts: "Daftar Akun", savingsGoals: "Target Tabungan", debts: "Buku Utang & Piutang", recurringMenu: "Langganan", myInvestments: "Investasi Saya", history: "Riwayat", calendar: "Kalender", btnSave: "Simpan" },
            en: { signIn: "Sign in to your wallet", hello: "Hello,", currentBalance: "Current Balance", quickMenu: "Quick Menu", topUp: "Top up", pay: "Pay", transfer: "Transfer", yourAccounts: "Your Accounts", savingsGoals: "Savings Goals", debts: "Debts & Receivables", recurringMenu: "Recurring", myInvestments: "My Investments", history: "History", calendar: "Calendar", btnSave: "Save" }
        };

        const t = (k) => translations[currentLang][k] || k;

        // AUTH LOGIC
        if (currentUser) { loginSuccess(); } else { document.getElementById('login-screen').classList.remove('hidden-page'); }

        async function login(e) {
            e.preventDefault(); toggleLoader(true);
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "login", email, password }) });
                const result = await res.json();
                if (result.status === "success") {
                    localStorage.setItem("fintrack_user", JSON.stringify(result));
                    currentUser = result; loginSuccess();
                } else { showToast(result.message, 'error'); }
            } catch (err) { showToast("Gagal menyambung server", 'error'); } finally { toggleLoader(false); }
        }

        function loginSuccess() {
            document.getElementById('login-screen').classList.add('hidden-page');
            document.getElementById('dashboard-screen').classList.remove('hidden-page');
            document.getElementById('bottom-nav').classList.remove('hidden-page');
            document.getElementById('user-display-name').innerText = currentUser.nama + "!";
            fetchData();
        }

        async function fetchData() {
            toggleLoader(true);
            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "getData", email: currentUser.email }) });
                allData = await res.json();
                allAccounts = allData.data || [];
                allHistory = allData.history || [];
                renderDashboard(); renderHistory();
            } catch (err) { console.error("Error Fetch"); } finally { toggleLoader(false); }
        }

        function renderDashboard() {
            const list = document.getElementById('account-list'); list.innerHTML = ""; let total = 0;
            allAccounts.forEach(acc => {
                const val = Number(acc.Saldo_Realtime) || 0; total += val;
                list.innerHTML += `<div class="bg-white dark:bg-gray-800 p-4 rounded-2xl flex justify-between border dark:border-gray-700 shadow-sm"><span>${acc.Nama_Akun}</span><span class="font-bold">Rp ${val.toLocaleString('id-ID')}</span></div>`;
            });
            document.getElementById('total-balance').innerText = isHomeBalanceHidden ? "********" : "Rp " + total.toLocaleString('id-ID');
            
            // RENDER TARGETS
            const gBox = document.getElementById('goals-container'); gBox.innerHTML = "";
            (allData.targets || []).forEach(g => {
                const pc = Math.min(100, (Number(g.Terkumpul) / Number(g.Nominal_Target)) * 100) || 0;
                gBox.innerHTML += `<div class="bg-gray-50 dark:bg-gray-700 p-3 rounded-xl"><div class="flex justify-between text-[10px] mb-1 font-bold"><span>${g.Nama_Target}</span><span>${pc.toFixed(0)}%</span></div><div class="w-full bg-gray-200 dark:bg-gray-600 h-1.5 rounded-full overflow-hidden"><div class="bg-[#6342E8] h-full" style="width:${pc}%"></div></div></div>`;
            });

            // RENDER DEBTS
            const dBox = document.getElementById('debts-container'); dBox.innerHTML = "";
            (allData.debts || []).forEach(d => {
                const isUtang = d.Tipe === "Utang";
                dBox.innerHTML += `<div class="bg-gray-50 dark:bg-gray-700 p-3 rounded-xl flex justify-between items-center"><div class="text-xs font-bold ${isUtang ? 'text-red-500' : 'text-green-500'}">${d.Tipe}<br><span class="text-gray-900 dark:text-white">${d.Nama_Orang}</span></div><div class="text-right text-xs font-bold dark:text-white">Rp ${Number(d.Sisa_Tagihan).toLocaleString('id-ID')}</div></div>`;
            });
        }

        function renderHistory() {
            const hBox = document.getElementById('history-list-container'); hBox.innerHTML = "";
            allHistory.slice(0, 15).forEach(trx => {
                const isInc = trx.tipe === "INFLOW";
                hBox.innerHTML += `<div class="bg-white dark:bg-gray-800 p-4 rounded-2xl flex justify-between border dark:border-gray-700 shadow-sm"><div><p class="font-bold text-sm dark:text-white">${trx.kategori}</p><p class="text-[10px] text-gray-400">${trx.akun}</p></div><div class="text-right font-bold ${isInc ? 'text-green-500' : 'text-red-500'}">${isInc ? '+' : '-'}Rp ${Number(trx.jumlah).toLocaleString('id-ID')}</div></div>`;
            });
        }

        // NAVIGATION LOGIC
        function goToNav(id) {
            ['dashboard', 'portfolio', 'history', 'calendar'].forEach(s => {
                document.getElementById(s + '-screen').classList.add('hidden-page');
                document.getElementById('nav-' + s)?.classList.remove('active');
            });
            document.getElementById(id + '-screen').classList.remove('hidden-page');
            document.getElementById('nav-' + id)?.classList.add('active');
        }

        function goToForm(type) {
            document.getElementById('dashboard-screen').classList.add('hidden-page');
            document.getElementById('form-screen').classList.remove('hidden-page');
            const selA = document.getElementById('akun'); selA.innerHTML = "";
            allAccounts.forEach(acc => selA.innerHTML += `<option value="${acc.Nama_Akun}">${acc.Nama_Akun}</option>`);
            const kats = type === 'Inflow' ? ['Gaji', 'Bonus', 'Bonus Usaha'] : ['Makanan', 'Transport', 'Belanja', 'WiFi'];
            const selK = document.getElementById('kategori'); selK.innerHTML = "";
            kats.forEach(k => selK.innerHTML += `<option value="${k}">${k}</option>`);
        }

        // UNIVERSAL MODAL LOGIC
        function openUniversalModal(type) {
            const cont = document.getElementById('universal-modal-container'); const form = document.getElementById('universal-form');
            cont.classList.remove('hidden');
            if (type === 'goal') {
                document.getElementById('universal-modal-title').innerText = "Buat Target Tabungan";
                form.innerHTML = `<input type="text" id="g-name" placeholder="Nama Target" class="w-full p-4 bg-gray-50 dark:bg-gray-700 dark:text-white rounded-xl outline-none" required><input type="text" id="g-nominal" placeholder="Target Nominal (Rp)" class="w-full p-4 bg-gray-50 dark:bg-gray-700 dark:text-white rounded-xl outline-none" required><input type="date" id="g-date" class="w-full p-4 bg-gray-50 dark:bg-gray-700 dark:text-gray-300 rounded-xl outline-none" required><button type="submit" class="w-full bg-[#6342E8] text-white py-4 rounded-xl font-bold">SIMPAN TARGET</button>`;
                formatInputNominal(document.getElementById('g-nominal'));
                form.onsubmit = async (e) => { e.preventDefault(); toggleLoader(true); await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "saveTarget", email: currentUser.email, nama: document.getElementById('g-name').value, nominal: document.getElementById('g-nominal').value.replace(/\./g, ''), deadline: document.getElementById('g-date').value }) }); closeUniversalModal(); fetchData(); };
            } else if (type === 'debt') {
                document.getElementById('universal-modal-title').innerText = "Catat Utang / Piutang";
                form.innerHTML = `<select id="d-type" class="w-full p-4 bg-gray-50 dark:bg-gray-700 dark:text-white rounded-xl outline-none"><option value="Utang">Saya Berutang</option><option value="Piutang">Orang Pinjam Saya</option></select><input type="text" id="d-name" placeholder="Nama Orang" class="w-full p-4 bg-gray-50 dark:bg-gray-700 dark:text-white rounded-xl outline-none" required><input type="text" id="d-nominal" placeholder="Nominal (Rp)" class="w-full p-4 bg-gray-50 dark:bg-gray-700 dark:text-white rounded-xl outline-none" required><input type="date" id="d-date" class="w-full p-4 bg-gray-50 dark:bg-gray-700 dark:text-gray-300 rounded-xl outline-none" required><button type="submit" class="w-full bg-[#6342E8] text-white py-4 rounded-xl font-bold">SIMPAN UTANG</button>`;
                formatInputNominal(document.getElementById('d-nominal'));
                form.onsubmit = async (e) => { e.preventDefault(); toggleLoader(true); await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "saveDebt", email: currentUser.email, tipe: document.getElementById('d-type').value, nama: document.getElementById('d-name').value, nominal: document.getElementById('d-nominal').value.replace(/\./g, ''), deadline: document.getElementById('d-date').value }) }); closeUniversalModal(); fetchData(); };
            } else if (type === 'recurring') {
                document.getElementById('universal-modal-title').innerText = "Langganan Otomatis";
                form.innerHTML = `<input type="number" id="r-date" min="1" max="31" placeholder="Tanggal Tagihan (1-31)" class="w-full p-4 bg-gray-50 dark:bg-gray-700 dark:text-white rounded-xl outline-none" required><input type="text" id="r-kategori" placeholder="Kategori (Contoh: WiFi)" class="w-full p-4 bg-gray-50 dark:bg-gray-700 dark:text-white rounded-xl outline-none" required><input type="text" id="r-akun" placeholder="Akun Sumber (Contoh: BCA)" class="w-full p-4 bg-gray-50 dark:bg-gray-700 dark:text-white rounded-xl outline-none" required><input type="text" id="r-nominal" placeholder="Potongan Bulanan (Rp)" class="w-full p-4 bg-gray-50 dark:bg-gray-700 dark:text-white rounded-xl outline-none" required><input type="text" id="r-ket" placeholder="Keterangan (Contoh: Netflix)" class="w-full p-4 bg-gray-50 dark:bg-gray-700 dark:text-white rounded-xl outline-none" required><button type="submit" class="w-full bg-[#6342E8] text-white py-4 rounded-xl font-bold">AKTIFKAN RECURRING</button>`;
                formatInputNominal(document.getElementById('r-nominal'));
                form.onsubmit = async (e) => { e.preventDefault(); toggleLoader(true); await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "saveRecurring", email: currentUser.email, tgl: document.getElementById('r-date').value, kategori: document.getElementById('r-kategori').value, akun: document.getElementById('r-akun').value, nominal: document.getElementById('r-nominal').value.replace(/\./g, ''), keterangan: document.getElementById('r-ket').value }) }); closeUniversalModal(); fetchData(); };
            }
        }

        // HELPERS
        function closeUniversalModal() { document.getElementById('universal-modal-container').classList.add('hidden'); }
        function toggleTheme() { document.documentElement.classList.toggle('dark'); }
        function toggleLoader(s) { document.getElementById('loader-overlay').classList.toggle('hidden', !s); }
        function toggleHomeBalance() { isHomeBalanceHidden = !isHomeBalanceHidden; renderDashboard(); }
        function showToast(m, type) { const t = document.getElementById('toast'); document.getElementById('toast-msg').innerText = m; t.classList.remove('opacity-0'); setTimeout(() => t.classList.add('opacity-0'), 3000); }
        function logout() { localStorage.removeItem("fintrack_user"); location.reload(); }
        function formatInputNominal(el) { el.addEventListener('input', function(e) { let v = this.value.replace(/[^0-9]/g, ''); this.value = v ? parseInt(v, 10).toLocaleString('id-ID') : ''; }); }
        
        document.getElementById('login-form').onsubmit = login;
        document.getElementById('jumlah').addEventListener('input', function(e) {
            let v = this.value.replace(/[^0-9]/g, '');
            this.value = v ? parseInt(v, 10).toLocaleString('id-ID') : '';
        });
    </script>
</body>
</html>
