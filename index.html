<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fintrack - Ultimate Wealth UI</title>
    <link rel="icon" href="Logo_Fintrack.png" type="image/png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { primary: '#6342E8', secondary: '#A88FFF' } } }
        }
    </script>

    <style>
        body { font-family: 'Poppins', sans-serif; overflow-x: hidden; transition: background-color 0.3s, color 0.3s; }
        .hidden-page { display: none !important; }
        .bg-purple-gradient { background: linear-gradient(135deg, #A88FFF 0%, #6342E8 100%); }
        .bg-light-purple { background-color: #F0EDFF; }
        .text-primary { color: #6342E8; }
        ::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .form-input { background: transparent; border: none; text-align: center; width: 100%; outline: none; }
        #loader-overlay { z-index: 9999; }
        .nav-btn.active { color: #6342E8; }
        .filter-tab.active { background-color: #6342E8; color: white; border-color: #6342E8; }
        .filter-tab { background-color: white; color: #6B7280; border: 1px solid #E5E7EB; transition: all 0.2s; }
        .dark .filter-tab { background-color: #1F2937; border-color: #374151; color: #9CA3AF; }
        .dark .filter-tab.active { background-color: #6342E8; color: white; border-color: #6342E8; }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen relative bg-[#F8F9FA] dark:bg-gray-900 text-gray-800 dark:text-gray-100 pb-28">

    <div id="loader-overlay" class="fixed inset-0 hidden flex flex-col justify-center items-center bg-white/90 dark:bg-gray-900/90 z-[9999]">
        <div class="w-10 h-10 border-4 border-[#6342E8] border-t-transparent rounded-full animate-spin"></div>
    </div>

    <div id="toast" class="fixed top-5 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-full shadow-2xl transition-all duration-300 opacity-0 z-[9999] pointer-events-none flex items-center gap-2 translate-y-[-20px] bg-green-500 text-white">
        <span id="toast-icon" class="font-bold">✓</span>
        <span id="toast-msg" class="text-sm font-bold">Pesan</span>
    </div>

    <div id="login-screen" class="min-h-screen flex flex-col justify-center px-8 bg-white dark:bg-gray-900 relative">
        <div class="z-10">
            <img src="Logo_Fintrack.png" alt="Fintrack Logo" class="h-20 w-auto mb-4 object-contain">
            <p data-i18n="signIn" class="text-sm text-gray-400 mb-10">Masuk ke dompet Anda</p>
            <form id="login-form" class="space-y-4">
                <input type="email" id="login-email" data-i18n-placeholder="emailPlaceholder" placeholder="Alamat Email" class="w-full p-4 bg-gray-50 dark:bg-gray-800 dark:text-white border border-gray-100 dark:border-gray-700 rounded-2xl outline-none focus:border-[#6342E8]" required>
                <input type="password" id="login-password" data-i18n-placeholder="passPlaceholder" placeholder="Kata Sandi" class="w-full p-4 bg-gray-50 dark:bg-gray-800 dark:text-white border border-gray-100 dark:border-gray-700 rounded-2xl outline-none focus:border-[#6342E8]" required>
                <button type="submit" data-i18n="btnLogin" class="w-full bg-[#6342E8] text-white py-4 rounded-2xl font-semibold shadow-lg active:scale-95 transition">Masuk</button>
            </form>
        </div>
        <div class="absolute top-[-10%] right-[-20%] w-64 h-64 bg-light-purple dark:bg-[#6342E8]/20 rounded-full blur-3xl opacity-60 pointer-events-none"></div>
    </div>

    <div id="dashboard-screen" class="hidden-page">
        <header class="px-6 pt-10 pb-4 flex justify-between items-center">
            <div>
                <p data-i18n="hello" class="text-gray-500 dark:text-gray-400 text-[13px] mb-1">Halo,</p>
                <h1 id="user-display-name" class="font-bold text-xl text-gray-900 dark:text-white leading-tight">User Name!</h1>
            </div>
            <div class="flex gap-2">
                <button type="button" onclick="toggleTheme()" class="w-12 h-10 rounded-[16px] border border-gray-200 dark:border-gray-700 flex items-center justify-center bg-white dark:bg-gray-800 shadow-sm active:scale-95 transition focus:outline-none">
                    <span class="dark:hidden text-lg">🌙</span><span class="hidden dark:block text-lg">☀️</span>
                </button>
                <button type="button" onclick="toggleLanguage()" class="w-12 h-10 rounded-[16px] border border-gray-200 dark:border-gray-700 flex items-center justify-center text-[#6342E8] dark:text-secondary font-black text-xs bg-white dark:bg-gray-800 shadow-sm active:scale-95 transition focus:outline-none">
                    <span id="lang-indicator">ID</span>
                </button>
            </div>
        </header>

        <section class="px-6 mb-6">
            <div class="bg-purple-gradient rounded-[28px] p-6 shadow-xl relative overflow-hidden">
                <div class="relative z-10">
                    <p data-i18n="currentBalance" class="text-white text-xs opacity-80 mb-1">Saldo Saat Ini</p>
                    <div class="flex items-center gap-3">
                        <h2 id="total-balance" class="text-white text-3xl font-bold tracking-tight">********</h2>
                        <button type="button" onclick="toggleHomeBalance()" class="text-white opacity-80 hover:opacity-100 transition focus:outline-none">
                            <svg id="eye-icon-home" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"></path></svg>
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <section class="px-6 mb-6 grid grid-cols-2 gap-3">
            <div class="bg-[#6342E8] p-4 rounded-[20px] text-white">
                <p data-i18n="income" class="text-[10px] opacity-80">Pemasukan</p>
                <p id="total-income" class="font-bold text-sm">********</p>
            </div>
            <div class="bg-white dark:bg-gray-800 p-4 rounded-[20px] shadow-sm border dark:border-gray-700">
                <p data-i18n="expenditure" class="text-[10px] text-gray-400">Pengeluaran</p>
                <p id="total-expenditure" class="font-bold text-sm dark:text-white">********</p>
            </div>
        </section>

        <section class="px-6 mb-6">
            <h3 data-i18n="quickMenu" class="font-bold text-gray-900 dark:text-white text-sm mb-3">Menu Cepat</h3>
            <div class="flex gap-3 overflow-x-auto pb-2 hide-scrollbar">
                <button type="button" onclick="goToForm('Inflow')" class="flex-none bg-light-purple dark:bg-gray-800 p-4 w-24 rounded-2xl border dark:border-gray-700 flex flex-col items-center gap-2 active:scale-95 transition">
                    <div class="w-10 h-10 bg-white dark:bg-gray-700 rounded-full flex items-center justify-center text-[#6342E8]">💰</div>
                    <span data-i18n="topUp" class="text-[10px] font-semibold text-[#6342E8] dark:text-secondary">Isi Saldo</span>
                </button>
                <button type="button" onclick="goToForm('Outflow')" class="flex-none bg-light-purple dark:bg-gray-800 p-4 w-24 rounded-2xl border dark:border-gray-700 flex flex-col items-center gap-2 active:scale-95 transition">
                    <div class="w-10 h-10 bg-white dark:bg-gray-700 rounded-full flex items-center justify-center text-[#6342E8]">💳</div>
                    <span data-i18n="pay" class="text-[10px] font-semibold text-[#6342E8] dark:text-secondary">Bayar</span>
                </button>
                <button type="button" onclick="goToTransferForm()" class="flex-none bg-light-purple dark:bg-gray-800 p-4 w-24 rounded-2xl border dark:border-gray-700 flex flex-col items-center gap-2 active:scale-95 transition">
                    <div class="w-10 h-10 bg-white dark:bg-gray-700 rounded-full flex items-center justify-center text-[#6342E8]">⇄</div>
                    <span data-i18n="transfer" class="text-[10px] font-semibold text-[#6342E8] dark:text-secondary">Transfer</span>
                </button>
                <button type="button" onclick="openUniversalModal('recurring')" class="flex-none bg-light-purple dark:bg-gray-800 p-4 w-24 rounded-2xl border dark:border-gray-700 flex flex-col items-center gap-2 active:scale-95 transition">
                    <div class="w-10 h-10 bg-white dark:bg-gray-700 rounded-full flex items-center justify-center text-[#6342E8]">🔄</div>
                    <span data-i18n="recurringMenu" class="text-[10px] font-semibold text-[#6342E8] dark:text-secondary">Langganan</span>
                </button>
            </div>
        </section>

        <section class="px-6 mb-6 space-y-4">
            <div class="bg-white dark:bg-gray-800 p-5 rounded-[24px] shadow-sm border border-gray-100 dark:border-gray-700">
                <div class="flex justify-between items-center mb-3">
                    <h3 data-i18n="savingsGoals" class="font-bold text-gray-900 dark:text-white text-sm">Target Tabungan</h3>
                    <button onclick="openUniversalModal('goal')" class="text-[#6342E8] dark:text-secondary text-[11px] font-bold bg-[#F0EDFF] dark:bg-gray-700 px-3 py-1.5 rounded-lg active:scale-95 transition">+ Target Baru</button>
                </div>
                <div id="goals-container" class="space-y-3"></div>
            </div>
            <div class="bg-white dark:bg-gray-800 p-5 rounded-[24px] shadow-sm border border-gray-100 dark:border-gray-700">
                <div class="flex justify-between items-center mb-3">
                    <h3 data-i18n="debts" class="font-bold text-gray-900 dark:text-white text-sm">Buku Utang & Piutang</h3>
                    <button onclick="openUniversalModal('debt')" class="text-[#6342E8] dark:text-secondary text-[11px] font-bold bg-[#F0EDFF] dark:bg-gray-700 px-3 py-1.5 rounded-lg active:scale-95 transition">+ Catat Utang</button>
                </div>
                <div id="debts-container" class="space-y-3"></div>
            </div>
        </section>

        <section class="px-6 mb-10">
            <h3 data-i18n="yourAccounts" class="font-bold text-gray-900 dark:text-white text-sm mb-4">Daftar Akun</h3>
            <div id="account-list" class="space-y-4 bg-white dark:bg-gray-800 p-5 rounded-[24px] shadow-sm border border-gray-100 dark:border-gray-700"></div>
        </section>
    </div>

    <div id="portfolio-screen" class="hidden-page min-h-screen bg-[#F8F9FA] dark:bg-gray-900 pb-24">
        <header class="px-6 pt-10 pb-4 bg-white dark:bg-gray-800 border-b dark:border-gray-700 sticky top-0 z-10 shadow-sm">
            <h2 data-i18n="myInvestments" class="font-bold text-xl text-[#6342E8]">Investasi Saya</h2>
        </header>
        <section class="px-6 mt-6">
            <div class="bg-white dark:bg-gray-800 p-6 rounded-[24px] shadow-sm border dark:border-gray-700 mb-6 flex justify-between items-center relative overflow-hidden">
                <div>
                    <p data-i18n="totalPortfolio" class="text-[10px] text-gray-400 font-bold uppercase mb-1">Total Nilai Portofolio</p>
                    <h2 id="total-investasi" class="text-3xl font-bold text-gray-900 dark:text-white">********</h2>
                </div>
                <button type="button" onclick="goToAssetForm()" class="bg-[#6342E8] text-white p-3 rounded-full shadow-lg">+</button>
            </div>
            <div id="porto-chart-section" class="bg-white dark:bg-gray-800 p-6 rounded-[24px] shadow-sm border dark:border-gray-700 mb-6 hidden">
                <canvas id="portoChart"></canvas>
            </div>
            <div id="portfolio-list" class="space-y-4"></div>
        </section>
    </div>

    <div id="history-screen" class="hidden-page min-h-screen bg-[#F8F9FA] dark:bg-gray-900 z-50 pb-24">
        <header class="p-6 flex items-center justify-between bg-white dark:bg-gray-800 border-b dark:border-gray-700 sticky top-0 z-10 shadow-sm">
            <h2 data-i18n="history" class="font-bold text-gray-900 dark:text-white text-2xl">Riwayat</h2>
            <button type="button" onclick="exportToPDF()" class="w-10 h-10 bg-gray-50 dark:bg-gray-700 text-[#6342E8] flex items-center justify-center rounded-xl">PDF</button>
        </header>
        <div id="history-list-container" class="p-6 space-y-4"></div>
    </div>

    <div id="calendar-screen" class="hidden-page min-h-screen bg-[#F8F9FA] dark:bg-gray-900 pb-24">
        <header class="px-6 pt-10 pb-4 bg-white dark:bg-gray-800 sticky top-0 z-10 shadow-sm"><h2 data-i18n="calendar" class="font-bold text-xl text-[#6342E8]">Kalender</h2></header>
        <div id="calendar-grid" class="px-6 mt-4 grid grid-cols-7 gap-1"></div>
    </div>

    <div id="universal-modal-container" class="fixed inset-0 hidden z-[60] bg-black/60 p-6 flex flex-col justify-end pb-10">
        <div class="bg-white dark:bg-gray-800 w-full rounded-[32px] p-6 shadow-2xl relative">
            <button onclick="closeUniversalModal()" class="absolute top-4 right-4 text-gray-400">✕</button>
            <h2 id="universal-modal-title" class="font-bold text-lg mb-6 dark:text-white">Judul Form</h2>
            <form id="universal-form" class="space-y-4"></form>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white dark:bg-gray-800 border-t dark:border-gray-700 px-6 py-4 flex justify-between items-center rounded-t-[32px] shadow-2xl z-40">
        <button onclick="goToNav('dashboard')" id="nav-dashboard" class="nav-btn active text-gray-400">DASH</button>
        <button onclick="goToNav('portfolio')" id="nav-portfolio" class="nav-btn text-gray-400">PORTO</button>
        <button onclick="goToNav('history')" id="nav-history" class="w-12 h-12 bg-[#6342E8] text-white rounded-full flex items-center justify-center relative -top-6">HIST</button>
        <button onclick="goToNav('calendar')" id="nav-calendar" class="nav-btn text-gray-400">CAL</button>
        <button onclick="logout()" class="text-red-400">EXIT</button>
    </nav>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycby_UJVN9rtPDxwzeMCC13e9c9dOtDaFBa3YekQEYIM81UO2EbD57ofD3yuOwSnXUAiy/exec";
        
        let currentUser = JSON.parse(localStorage.getItem("fintrack_user"));
        let allData = {}; let currentLang = "id"; let isHomeBalanceHidden = true; let isPortoBalanceHidden = true;

        const translations = {
            id: { signIn: "Masuk ke dompet Anda", hello: "Halo,", currentBalance: "Saldo Saat Ini", quickMenu: "Menu Cepat", topUp: "Isi Saldo", pay: "Bayar", transfer: "Transfer", yourAccounts: "Daftar Akun", savingsGoals: "Target Tabungan", debts: "Buku Utang & Piutang", recurringMenu: "Langganan", myInvestments: "Investasi Saya", history: "Riwayat", calendar: "Kalender", btnSave: "Simpan", noGoals: "Belum ada target tabungan.", noDebts: "Bersih dari utang & piutang." },
            en: { signIn: "Sign in to your wallet", hello: "Hello,", currentBalance: "Current Balance", quickMenu: "Quick Menu", topUp: "Top up", pay: "Pay", transfer: "Transfer", yourAccounts: "Your Accounts", savingsGoals: "Savings Goals", debts: "Debts & Receivables", recurringMenu: "Recurring", myInvestments: "My Investments", history: "History", calendar: "Calendar", btnSave: "Save", noGoals: "No goals.", noDebts: "No debts." }
        };
        const t = (k) => translations[currentLang][k] || k;

        // THEME LOGIC
        if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');
        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        }

        // AUTH & FETCH
        if (currentUser) { loginSuccess(); } else { document.getElementById('login-screen').classList.remove('hidden-page'); }

        async function login(e) {
            e.preventDefault(); toggleLoader(true);
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "login", email, password }) });
                const result = await res.json();
                if (result.status === "success") { localStorage.setItem("fintrack_user", JSON.stringify(result)); currentUser = result; loginSuccess(); }
                else { alert(result.message); }
            } catch (err) { alert("API Error"); } finally { toggleLoader(false); }
        }

        function loginSuccess() {
            document.getElementById('login-screen').classList.add('hidden-page');
            document.getElementById('dashboard-screen').classList.remove('hidden-page');
            document.getElementById('user-display-name').innerText = currentUser.nama + "!";
            fetchData();
        }

        async function fetchData() {
            toggleLoader(true);
            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "getData", email: currentUser.email }) });
                allData = await res.json();
                renderDashboard(); renderHistory();
            } catch (err) { console.error("Fetch Error"); } finally { toggleLoader(false); }
        }

        function renderDashboard() {
            // Render Saldo & Akun
            const list = document.getElementById('account-list'); list.innerHTML = ""; let total = 0;
            (allData.data || []).forEach(acc => {
                const val = Number(acc.Saldo_Realtime) || 0; total += val;
                list.innerHTML += `<div class="flex justify-between py-2 border-b dark:border-gray-700"><span>${acc.Nama_Akun}</span><span class="font-bold">Rp ${val.toLocaleString('id-ID')}</span></div>`;
            });
            document.getElementById('total-balance').innerText = isHomeBalanceHidden ? "********" : "Rp " + total.toLocaleString('id-ID');
            
            // Render Target
            const gBox = document.getElementById('goals-container'); gBox.innerHTML = "";
            if(!allData.targets || allData.targets.length === 0) gBox.innerHTML = `<p class='text-xs text-gray-400'>${t('noGoals')}</p>`;
            (allData.targets || []).forEach(g => {
                const pc = Math.min(100, (Number(g.Terkumpul) / Number(g.Nominal_Target)) * 100) || 0;
                gBox.innerHTML += `<div class="text-[10px] mb-1 flex justify-between"><span>${g.Nama_Target}</span><span class="font-bold">${pc.toFixed(0)}%</span></div><div class="w-full bg-gray-100 dark:bg-gray-700 h-1.5 rounded-full overflow-hidden mb-2"><div class="bg-[#6342E8] h-full" style="width:${pc}%"></div></div>`;
            });

            // Render Utang
            const dBox = document.getElementById('debts-container'); dBox.innerHTML = "";
            if(!allData.debts || allData.debts.length === 0) dBox.innerHTML = `<p class='text-xs text-gray-400'>${t('noDebts')}</p>`;
            (allData.debts || []).forEach(d => {
                const isUtang = d.Tipe === "Utang";
                dBox.innerHTML += `<div class="flex justify-between items-center text-xs py-1 border-b dark:border-gray-700"><div class="font-bold ${isUtang ? 'text-red-500':'text-green-500'}">${d.Tipe} - ${d.Nama_Orang}</div><div class="font-bold">Rp ${Number(d.Sisa_Tagihan).toLocaleString('id-ID')}</div></div>`;
            });
        }

        function renderHistory() {
            const hBox = document.getElementById('history-list-container'); hBox.innerHTML = "";
            (allData.history || []).slice(0, 15).forEach(trx => {
                const isInc = trx.tipe === "INFLOW";
                hBox.innerHTML += `<div class="bg-white dark:bg-gray-800 p-4 rounded-2xl flex justify-between border dark:border-gray-700 shadow-sm"><div><p class="font-bold text-sm">${trx.kategori}</p><p class="text-[10px] text-gray-400">${trx.akun}</p></div><div class="text-right font-bold ${isInc ? 'text-green-500' : 'text-red-500'}">${isInc ? '+' : '-'}Rp ${Number(trx.jumlah).toLocaleString('id-ID')}</div></div>`;
            });
        }

        // NAV & HELPERS
        function goToNav(id) {
            ['dashboard', 'portfolio', 'history', 'calendar'].forEach(s => {
                document.getElementById(s + '-screen').classList.add('hidden-page');
                document.getElementById('nav-' + s)?.classList.remove('active');
            });
            document.getElementById(id + '-screen').classList.remove('hidden-page');
            document.getElementById('nav-' + id)?.classList.add('active');
            if(id === 'portfolio') renderPortfolio();
        }

        function openUniversalModal(type) {
            document.getElementById('universal-modal-container').classList.remove('hidden');
            const form = document.getElementById('universal-form');
            if(type === 'goal') {
                document.getElementById('universal-modal-title').innerText = "Tambah Target";
                form.innerHTML = `<input type="text" id="g-name" placeholder="Nama Target" class="w-full p-4 bg-gray-50 dark:bg-gray-700 rounded-xl outline-none" required><input type="number" id="g-nominal" placeholder="Nominal" class="w-full p-4 bg-gray-50 dark:bg-gray-700 rounded-xl outline-none" required><input type="date" id="g-date" class="w-full p-4 bg-gray-50 dark:bg-gray-700 rounded-xl outline-none" required><button type="submit" class="w-full bg-[#6342E8] text-white py-4 rounded-xl font-bold">BUAT TARGET</button>`;
                form.onsubmit = async (e) => { e.preventDefault(); toggleLoader(true); await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "saveTarget", email: currentUser.email, nama: document.getElementById('g-name').value, nominal: document.getElementById('g-nominal').value, deadline: document.getElementById('g-date').value }) }); location.reload(); };
            } else if(type === 'debt') {
                document.getElementById('universal-modal-title').innerText = "Catat Utang";
                form.innerHTML = `<select id="d-type" class="w-full p-4 bg-gray-50 dark:bg-gray-700 rounded-xl outline-none"><option value="Utang">Saya Berutang</option><option value="Piutang">Orang Pinjam</option></select><input type="text" id="d-name" placeholder="Nama" class="w-full p-4 bg-gray-50 dark:bg-gray-700 rounded-xl outline-none" required><input type="number" id="d-nominal" placeholder="Nominal" class="w-full p-4 bg-gray-50 dark:bg-gray-700 rounded-xl outline-none" required><input type="date" id="d-date" class="w-full p-4 bg-gray-50 dark:bg-gray-700 rounded-xl outline-none" required><button type="submit" class="w-full bg-[#6342E8] text-white py-4 rounded-xl font-bold">SIMPAN UTANG</button>`;
                form.onsubmit = async (e) => { e.preventDefault(); toggleLoader(true); await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "saveDebt", email: currentUser.email, tipe: document.getElementById('d-type').value, nama: document.getElementById('d-name').value, nominal: document.getElementById('d-nominal').value, deadline: document.getElementById('d-date').value }) }); location.reload(); };
            } else if(type === 'recurring') {
                document.getElementById('universal-modal-title').innerText = "Langganan";
                form.innerHTML = `<input type="number" id="r-date" min="1" max="31" placeholder="Tanggal" class="w-full p-4 bg-gray-50 dark:bg-gray-700 rounded-xl outline-none" required><input type="text" id="r-kat" placeholder="Kategori" class="w-full p-4 bg-gray-50 dark:bg-gray-700 rounded-xl outline-none" required><input type="text" id="r-akun" placeholder="Akun" class="w-full p-4 bg-gray-50 dark:bg-gray-700 rounded-xl outline-none" required><input type="number" id="r-nom" placeholder="Nominal" class="w-full p-4 bg-gray-50 dark:bg-gray-700 rounded-xl outline-none" required><input type="text" id="r-ket" placeholder="Keterangan" class="w-full p-4 bg-gray-50 dark:bg-gray-700 rounded-xl outline-none" required><button type="submit" class="w-full bg-[#6342E8] text-white py-4 rounded-xl font-bold">SIMPAN</button>`;
                form.onsubmit = async (e) => { e.preventDefault(); toggleLoader(true); await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "saveRecurring", email: currentUser.email, tgl: document.getElementById('r-date').value, kategori: document.getElementById('r-kat').value, akun: document.getElementById('r-akun').value, nominal: document.getElementById('r-nom').value, keterangan: document.getElementById('r-ket').value }) }); location.reload(); };
            }
        }

        function toggleHomeBalance() { isHomeBalanceHidden = !isHomeBalanceHidden; renderDashboard(); }
        function togglePortoBalance() { isPortoBalanceHidden = !isPortoBalanceHidden; renderPortfolio(); }
        function logout() { localStorage.removeItem("fintrack_user"); location.reload(); }
        function toggleLoader(s) { document.getElementById('loader-overlay').classList.toggle('hidden', !s); }
        function closeUniversalModal() { document.getElementById('universal-modal-container').classList.add('hidden'); }
        document.getElementById('login-form').onsubmit = login;
    </script>
</body>
</html>
