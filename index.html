<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fintrack - Ultimate Wealth UI</title>
    <link rel="icon" href="Logo_Fintrack.png" type="image/png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { primary: '#6342E8', secondary: '#A88FFF' } } }
        }
    </script>

    <style>
        body { font-family: 'Poppins', sans-serif; overflow-x: hidden; transition: background-color 0.3s, color 0.3s; }
        .hidden-page { display: none !important; }
        .bg-purple-gradient { background: linear-gradient(135deg, #A88FFF 0%, #6342E8 100%); }
        .bg-light-purple { background-color: #F0EDFF; }
        .text-primary { color: #6342E8; }
        ::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .form-input { background: transparent; border: none; text-align: center; width: 100%; outline: none; }
        #loader-overlay { z-index: 9999; }
        .nav-btn.active { color: #6342E8; }
        .filter-tab.active { background-color: #6342E8; color: white; border-color: #6342E8; }
        .filter-tab { background-color: white; color: #6B7280; border: 1px solid #E5E7EB; transition: all 0.2s; }
        .dark .filter-tab { background-color: #1F2937; border-color: #374151; color: #9CA3AF; }
        .dark .filter-tab.active { background-color: #6342E8; color: white; border-color: #6342E8; }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen relative bg-[#F8F9FA] dark:bg-gray-900 text-gray-800 dark:text-gray-100 pb-28">

    <div id="loader-overlay" class="fixed inset-0 hidden flex flex-col justify-center items-center bg-white/90 dark:bg-gray-900/90 z-[9999]">
        <div class="w-10 h-10 border-4 border-[#6342E8] border-t-transparent rounded-full animate-spin"></div>
    </div>

    <div id="toast" class="fixed top-5 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-full shadow-2xl transition-all duration-300 opacity-0 z-[9999] pointer-events-none flex items-center gap-2 translate-y-[-20px] bg-red-500 text-white">
        <span id="toast-icon" class="font-bold">✕</span>
        <span id="toast-msg" class="text-sm font-bold">Pesan</span>
    </div>

    <div id="login-screen" class="min-h-screen flex flex-col justify-center px-8 bg-white dark:bg-gray-900 relative z-[20]">
        <h1 class="text-4xl font-extrabold text-[#6342E8] mb-2">Fintrack</h1>
        <p data-i18n="signIn" class="text-sm text-gray-400 mb-10">Masuk ke dompet Anda</p>
        <form id="login-form" class="space-y-4">
            <input type="email" id="login-email" data-i18n-placeholder="emailPlaceholder" placeholder="Alamat Email" class="w-full p-4 bg-gray-50 dark:bg-gray-800 dark:text-white border border-gray-100 dark:border-gray-700 rounded-2xl outline-none focus:border-[#6342E8]" required>
            <input type="password" id="login-password" data-i18n-placeholder="passPlaceholder" placeholder="Kata Sandi" class="w-full p-4 bg-gray-50 dark:bg-gray-800 dark:text-white border border-gray-100 dark:border-gray-700 rounded-2xl outline-none focus:border-[#6342E8]" required>
            <button type="submit" data-i18n="btnLogin" class="w-full bg-[#6342E8] text-white py-4 rounded-2xl font-semibold shadow-lg active:scale-95 transition">Masuk</button>
        </form>
    </div>

    <div id="dashboard-screen" class="hidden-page">
        <header class="px-6 pt-10 pb-4 flex justify-between items-center">
            <div>
                <p data-i18n="hello" class="text-gray-500 dark:text-gray-400 text-[13px] mb-1">Halo,</p>
                <h1 id="user-display-name" class="font-bold text-xl text-gray-900 dark:text-white leading-tight">User!</h1>
            </div>
            <div class="flex gap-2">
                <button onclick="toggleTheme()" class="w-12 h-10 rounded-[16px] border border-gray-200 dark:border-gray-700 flex items-center justify-center bg-white dark:bg-gray-800 shadow-sm active:scale-95 transition">
                    <span class="dark:hidden">🌙</span><span class="hidden dark:block">☀️</span>
                </button>
                <button onclick="toggleLanguage()" class="w-12 h-10 rounded-[16px] border border-gray-200 dark:border-gray-700 flex items-center justify-center text-[#6342E8] font-black text-xs bg-white dark:bg-gray-800 shadow-sm active:scale-95 transition">
                    <span id="lang-indicator">ID</span>
                </button>
            </div>
        </header>

        <section class="px-6 mb-6">
            <div class="bg-purple-gradient rounded-[28px] p-6 shadow-xl relative overflow-hidden">
                <p data-i18n="currentBalance" class="text-white text-xs opacity-80 mb-1">Saldo Saat Ini</p>
                <div class="flex items-center gap-3">
                    <h2 id="total-balance" class="text-white text-3xl font-bold tracking-tight">********</h2>
                    <button onclick="toggleHomeBalance()" class="text-white opacity-80"><svg id="eye-icon-home" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"></path></svg></button>
                </div>
            </div>
        </section>

        <section class="px-6 mb-6 grid grid-cols-2 gap-3">
            <div class="bg-[#6342E8] p-4 rounded-[20px] text-white">
                <p data-i18n="income" class="text-[10px] opacity-80">Pemasukan</p>
                <p id="total-income" class="font-bold text-sm">Rp 0</p>
            </div>
            <div class="bg-white dark:bg-gray-800 p-4 rounded-[20px] shadow-sm border border-gray-100 dark:border-gray-700">
                <p data-i18n="expenditure" class="text-[10px] text-gray-400">Pengeluaran</p>
                <p id="total-expenditure" class="font-bold text-sm dark:text-white">Rp 0</p>
            </div>
        </section>

        <section class="px-6 mb-6">
            <div class="flex gap-2">
                <button onclick="goToForm('Inflow')" class="flex-1 bg-light-purple dark:bg-gray-800 p-3 rounded-[16px] text-[#6342E8] dark:text-secondary font-bold text-[10px] active:scale-95 transition">TOP UP</button>
                <button onclick="goToForm('Outflow')" class="flex-1 bg-light-purple dark:bg-gray-800 p-3 rounded-[16px] text-[#6342E8] dark:text-secondary font-bold text-[10px] active:scale-95 transition">PAY</button>
                <button onclick="goToTransferForm()" class="flex-1 bg-light-purple dark:bg-gray-800 p-3 rounded-[16px] text-[#6342E8] dark:text-secondary font-bold text-[10px] active:scale-95 transition">TRANSFER</button>
                <button onclick="openUniversalModal('recurring')" class="flex-1 bg-light-purple dark:bg-gray-800 p-3 rounded-[16px] text-[#6342E8] dark:text-secondary font-bold text-[10px] active:scale-95 transition">RECURRING</button>
            </div>
        </section>

        <section class="px-6 mb-6 space-y-4">
            <div class="bg-white dark:bg-gray-800 p-4 rounded-[20px] shadow-sm border dark:border-gray-700">
                <div class="flex justify-between items-center mb-3">
                    <h3 data-i18n="savingsGoals" class="font-bold text-sm">Target Tabungan</h3>
                    <button onclick="openUniversalModal('goal')" class="text-[#6342E8] text-[10px] font-bold">+ BARU</button>
                </div>
                <div id="goals-container" class="space-y-2"></div>
            </div>
            <div class="bg-white dark:bg-gray-800 p-4 rounded-[20px] shadow-sm border dark:border-gray-700">
                <div class="flex justify-between items-center mb-3">
                    <h3 data-i18n="debts" class="font-bold text-sm">Utang & Piutang</h3>
                    <button onclick="openUniversalModal('debt')" class="text-[#6342E8] text-[10px] font-bold">+ CATAT</button>
                </div>
                <div id="debts-container" class="space-y-2"></div>
            </div>
        </section>

        <section class="px-6 mb-10">
            <h3 data-i18n="yourAccounts" class="font-bold text-sm mb-3">Daftar Akun</h3>
            <div id="account-list" class="space-y-3"></div>
        </section>
    </div>

    <div id="portfolio-screen" class="hidden-page min-h-screen bg-[#F8F9FA] dark:bg-gray-900 pb-24">
        <header class="px-6 pt-10 pb-4 bg-white dark:bg-gray-800 sticky top-0 z-10 shadow-sm">
            <h2 data-i18n="myInvestments" class="font-bold text-xl text-[#6342E8]">Investasi Saya</h2>
        </header>
        <div id="portfolio-list" class="px-6 mt-6 space-y-4"></div>
    </div>

    <div id="history-screen" class="hidden-page min-h-screen bg-[#F8F9FA] dark:bg-gray-900 pb-24">
        <header class="p-6 flex justify-between bg-white dark:bg-gray-800 border-b dark:border-gray-700 sticky top-0 z-10 shadow-sm">
            <h2 data-i18n="history" class="font-bold text-2xl">Riwayat</h2>
            <button onclick="exportToPDF()" class="w-10 h-10 bg-gray-50 dark:bg-gray-700 text-[#6342E8] flex items-center justify-center rounded-xl">PDF</button>
        </header>
        <div id="history-list-container" class="p-6 space-y-4"></div>
    </div>

    <div id="calendar-screen" class="hidden-page min-h-screen bg-[#F8F9FA] dark:bg-gray-900 pb-24">
        <header class="px-6 pt-10 pb-4 bg-white dark:bg-gray-800 sticky top-0 z-10 shadow-sm">
            <h2 data-i18n="calendar" class="font-bold text-xl text-[#6342E8]">Kalender</h2>
        </header>
        <div id="calendar-grid" class="px-6 mt-4 grid grid-cols-7 gap-1"></div>
    </div>

    <nav id="bottom-nav" class="hidden-page fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white dark:bg-gray-800 border-t dark:border-gray-700 px-6 py-4 flex justify-between items-center rounded-t-[32px] shadow-2xl z-40">
        <button onclick="goToNav('dashboard')" id="nav-dashboard" class="nav-btn active text-gray-400">DASH</button>
        <button onclick="goToNav('portfolio')" id="nav-portfolio" class="nav-btn text-gray-400">PORTO</button>
        <button onclick="goToNav('history')" id="nav-history" class="w-12 h-12 bg-[#6342E8] text-white rounded-full flex items-center justify-center relative -top-6">HIST</button>
        <button onclick="goToNav('calendar')" id="nav-calendar" class="nav-btn text-gray-400">CAL</button>
        <button onclick="logout()" class="text-red-400">EXIT</button>
    </nav>

    <div id="universal-modal-container" class="fixed inset-0 hidden z-[60] bg-black/60 p-6 flex flex-col justify-end pb-10">
        <div class="bg-white dark:bg-gray-800 w-full rounded-[32px] p-6 shadow-2xl relative">
            <button onclick="closeUniversalModal()" class="absolute top-4 right-4 text-gray-400">✕</button>
            <h2 id="universal-modal-title" class="font-bold text-lg mb-6 dark:text-white">Form</h2>
            <form id="universal-form" class="space-y-4"></form>
        </div>
    </div>

    <div id="form-screen" class="hidden-page min-h-screen bg-white dark:bg-gray-900 absolute inset-0 z-50 p-6">
        <button onclick="goToNav('dashboard')" class="mb-6">✕ Back</button>
        <form id="trans-form" class="space-y-6">
            <div class="text-center"><p data-i18n="amount" class="text-xs text-gray-400">Nominal</p><input type="text" id="jumlah" class="text-4xl font-bold text-center w-full outline-none text-[#6342E8] bg-transparent" placeholder="0" required autofocus></div>
            <input type="text" id="keterangan" placeholder="Keterangan" class="w-full p-4 bg-gray-50 dark:bg-gray-800 rounded-2xl outline-none" required>
            <select id="kategori" class="w-full p-4 bg-gray-50 dark:bg-gray-800 rounded-2xl outline-none"></select>
            <select id="akun" class="w-full p-4 bg-gray-50 dark:bg-gray-800 rounded-2xl outline-none"></select>
            <button type="submit" class="w-full bg-[#6342E8] text-white py-4 rounded-2xl font-bold">SIMPAN</button>
        </form>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycby_UJVN9rtPDxwzeMCC13e9c9dOtDaFBa3YekQEYIM81UO2EbD57ofD3yuOwSnXUAiy/exec";
        
        let currentUser = JSON.parse(localStorage.getItem("fintrack_user"));
        let allData = {}; let currentLang = "id";

        // LOGIC STARTUP
        if (currentUser) { loginSuccess(); } else { document.getElementById('login-screen').classList.remove('hidden-page'); }

        async function login(e) {
            e.preventDefault(); toggleLoader(true);
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "login", email, password }) });
                const result = await res.json();
                if (result.status === "success") {
                    localStorage.setItem("fintrack_user", JSON.stringify(result));
                    currentUser = result; loginSuccess();
                } else { showToast(result.message); }
            } catch (err) { showToast("Gagal menyambung ke server"); } finally { toggleLoader(false); }
        }

        function loginSuccess() {
            document.getElementById('login-screen').classList.add('hidden-page');
            document.getElementById('dashboard-screen').classList.remove('hidden-page');
            document.getElementById('bottom-nav').classList.remove('hidden-page');
            document.getElementById('user-display-name').innerText = currentUser.nama + "!";
            fetchData();
        }

        async function fetchData() {
            toggleLoader(true);
            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "getData", email: currentUser.email }) });
                allData = await res.json();
                renderDashboard();
            } catch (err) { console.error("Error ditarik"); } finally { toggleLoader(false); }
        }

        function renderDashboard() {
            const list = document.getElementById('account-list'); list.innerHTML = ""; let total = 0;
            allData.data.forEach(acc => {
                total += Number(acc.Saldo_Realtime);
                list.innerHTML += `<div class="flex justify-between py-2 border-b dark:border-gray-700"><span>${acc.Nama_Akun}</span><span class="font-bold">Rp ${Number(acc.Saldo_Realtime).toLocaleString('id-ID')}</span></div>`;
            });
            document.getElementById('total-balance').innerText = "Rp " + total.toLocaleString('id-ID');
            
            // Render Target
            const gBox = document.getElementById('goals-container'); gBox.innerHTML = "";
            (allData.targets || []).forEach(g => {
                const pc = Math.min(100, (g.Terkumpul / g.Nominal_Target) * 100);
                gBox.innerHTML += `<div class="text-[10px] mb-1 flex justify-between"><span>${g.Nama_Target}</span><span>${pc.toFixed(0)}%</span></div><div class="w-full bg-gray-100 dark:bg-gray-700 h-1 rounded-full overflow-hidden mb-2"><div class="bg-[#6342E8] h-full" style="width:${pc}%"></div></div>`;
            });
        }

        // NAVIGATION
        function goToNav(id) {
            ['dashboard', 'portfolio', 'history', 'calendar'].forEach(s => document.getElementById(s + '-screen').classList.add('hidden-page'));
            document.getElementById(id + '-screen').classList.remove('hidden-page');
        }

        function goToForm(type) {
            document.getElementById('dashboard-screen').classList.add('hidden-page');
            document.getElementById('form-screen').classList.remove('hidden-page');
            document.getElementById('form-screen').setAttribute('data-type', type);
            const selA = document.getElementById('akun'); selA.innerHTML = "";
            allData.data.forEach(acc => selA.innerHTML += `<option value="${acc.Nama_Akun}">${acc.Nama_Akun}</option>`);
            const kats = type === 'Inflow' ? ['Gaji', 'Bonus'] : ['Makanan', 'Transport', 'Wifi', 'Listrik'];
            const selK = document.getElementById('kategori'); selK.innerHTML = "";
            kats.forEach(k => selK.innerHTML += `<option value="${k}">${k}</option>`);
        }

        function logout() { localStorage.removeItem("fintrack_user"); location.reload(); }
        function toggleLoader(s) { document.getElementById('loader-overlay').classList.toggle('hidden', !s); }
        function showToast(m) { const t = document.getElementById('toast'); document.getElementById('toast-msg').innerText = m; t.classList.remove('opacity-0'); setTimeout(() => t.classList.add('opacity-0'), 3000); }
        function openUniversalModal(t) { document.getElementById('universal-modal-container').classList.remove('hidden'); }
        function closeUniversalModal() { document.getElementById('universal-modal-container').classList.add('hidden'); }
        function toggleTheme() { document.documentElement.classList.toggle('dark'); }

        document.getElementById('login-form').onsubmit = login;
        document.getElementById('jumlah').addEventListener('input', function(e) {
            let v = this.value.replace(/[^0-9]/g, '');
            this.value = v ? parseInt(v, 10).toLocaleString('id-ID') : '';
        });
    </script>
</body>
</html>
